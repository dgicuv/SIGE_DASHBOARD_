<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <defs>
    <linearGradient id="gradientGreen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#a3e2c9" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#a3e2c9" stop-opacity="0.05"/>
    </linearGradient>

    <linearGradient id="gradientBlue" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4682b4" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#4682b4" stop-opacity="0.0"/>
    </linearGradient>
  </defs>

  <rect width="500" height="500" fill="#ffffff" />

  <path d="M 0,280
           C 80,280 160,70 240,70
           C 320,70 400,280 480,280
           L 480,500 L 0,500 Z"
        fill="url(#gradientGreen)" />

  <path d="M 0,280
           C 80,280 160,70 240,70
           C 320,70 400,280 480,280"
        fill="none" stroke="#5cb87e" stroke-width="4" stroke-linecap="round" />

  <circle cx="0" cy="280" r="5" fill="#5cb87e" stroke="#ffffff" stroke-width="2" />
  <circle cx="120" cy="175" r="5" fill="#5cb87e" stroke="#ffffff" stroke-width="2" />
  <circle cx="240" cy="70" r="5" fill="#5cb87e" stroke="#ffffff" stroke-width="2" />
  <circle cx="360" cy="175" r="5" fill="#5cb87e" stroke="#ffffff" stroke-width="2" />
  <circle cx="480" cy="280" r="5" fill="#5cb87e" stroke="#ffffff" stroke-width="2" />

  <path d="M 0,390
           C 80,390 160,250 240,250
           C 320,250 400,390 480,390
           L 480,500 L 0,500 Z"
