  <circle cx="0" cy="390" r="5" fill="#4682b4" stroke="#ffffff" stroke-width="2" />
  <circle cx="120" cy="320" r="5" fill="#4682b4" stroke="#ffffff" stroke-width="2" />
  <circle cx="240" cy="250" r="5" fill="#4682b4" stroke="#ffffff" stroke-width="2" />
  <circle cx="360" cy="320" r="5" fill="#4682b4" stroke="#ffffff" stroke-width="2" />
  <circle cx="480" cy="390" r="5" fill="#4682b4" stroke="#ffffff" stroke-width="2" />
